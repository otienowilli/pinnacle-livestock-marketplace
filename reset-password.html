<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Pinnacle</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1b5e20,#2e7d32 60%,#388e3c);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:24px;padding:48px 44px;max-width:440px;width:100%;box-shadow:0 40px 80px rgba(0,0,0,.3);animation:slideUp .4s ease}
    @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
    .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
    .logo img{width:48px;height:48px;border-radius:50%;object-fit:cover}
    .logo span{font-size:1.6rem;font-weight:800;color:#1b5e20;letter-spacing:1.5px}
    h2{font-size:1.4rem;font-weight:800;color:#1a1a2e;margin-bottom:8px;text-align:center}
    .sub{color:#6b7280;font-size:.88rem;text-align:center;margin-bottom:28px;line-height:1.6}
    .form-group{display:flex;flex-direction:column;gap:14px;margin-bottom:6px}
    .input-wrap{position:relative}
    .input-wrap i{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:.9rem}
    input{width:100%;padding:13px 16px 13px 40px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.95rem;outline:none;transition:.2s;font-family:inherit;background:#f9fafb}
    input:focus{border-color:#2e7d32;background:#fff;box-shadow:0 0 0 3px rgba(46,125,50,.1)}
    .btn{width:100%;padding:14px;background:#2e7d32;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn:hover{background:#1b5e20}
    .btn:disabled{opacity:.6;cursor:default}
    .msg{padding:14px 16px;border-radius:10px;font-size:.88rem;margin-top:16px;text-align:center;display:none}
    .msg.success{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;display:block}
    .msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block}
    .back{text-align:center;margin-top:20px;font-size:.85rem;color:#6b7280}
    .back a{color:#2e7d32;font-weight:600;text-decoration:none}
    .back a:hover{text-decoration:underline}
    .hint{font-size:.78rem;color:#9ca3af;margin-top:4px;padding-left:4px}
    #successState{display:none;text-align:center;padding:10px 0}
    #successState i{font-size:3rem;color:#2e7d32;display:block;margin-bottom:16px}
    #successState h3{color:#1a1a2e;margin-bottom:10px}
    #successState p{color:#6b7280;font-size:.9rem;line-height:1.6;margin-bottom:24px}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="WhatsApp Image 2026-03-13 at 08.22.38.jpeg" alt="Pinnacle"/>
    <span>PINNACLE</span>
  </div>

  <!-- Form state -->
  <div id="formState">
    <h2>Set New Password</h2>
    <p class="sub">Choose a strong password for your Pinnacle account.</p>
    <form id="resetForm" class="form-group">
      <div>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="newPassword" placeholder="New Password" required minlength="6"/>
        </div>
        <p class="hint">At least 6 characters</p>
      </div>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm New Password" required/>
      </div>
      <button type="submit" class="btn" id="submitBtn">
        <i class="fas fa-key"></i> Reset Password
      </button>
    </form>
    <div class="msg" id="msgBox"></div>
  </div>

  <!-- Success state -->
  <div id="successState">
    <i class="fas fa-circle-check"></i>
    <h3>Password Reset!</h3>
    <p>Your password has been updated successfully. You can now sign in with your new password.</p>
    <a href="index.html" class="btn" style="text-decoration:none">
      <i class="fas fa-sign-in-alt"></i> Go to Sign In
    </a>
  </div>

  <div class="back"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Pinnacle</a></div>
</div>

<script>
  const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:3001/api'
    : '/api';

  const token = new URLSearchParams(location.search).get('token');

  // No token in URL — show error immediately
  if (!token) {
    document.getElementById('formState').innerHTML = `
      <div style="text-align:center;padding:10px 0">
        <i class="fas fa-triangle-exclamation" style="font-size:2.5rem;color:#dc2626;display:block;margin-bottom:14px"></i>
        <h2 style="margin-bottom:10px">Invalid Link</h2>
        <p class="sub">This reset link is missing or invalid. Please request a new one.</p>
        <a href="index.html" class="btn" style="text-decoration:none;margin-top:16px;display:flex">
          <i class="fas fa-arrow-left"></i> Back to Pinnacle
        </a>
      </div>`;
  }

  document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('newPassword').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const btn      = document.getElementById('submitBtn');
    const msgBox   = document.getElementById('msgBox');

    msgBox.className = 'msg'; msgBox.textContent = '';

    if (password !== confirm) {
      msgBox.className = 'msg error';
      msgBox.textContent = '❌ Passwords do not match.';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting…';

    try {
      const res  = await fetch(`${API}/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong.');
      document.getElementById('formState').style.display  = 'none';
      document.getElementById('successState').style.display = 'block';
    } catch(err) {
      msgBox.className = 'msg error';
      msgBox.textContent = '❌ ' + err.message;
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
    }
  });
</script>
</body>
</html>
